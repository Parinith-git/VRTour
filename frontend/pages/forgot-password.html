<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - VRTour</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <script src="../js/theme.js"></script>

    <nav class="glass">
        <a href="../index.html" class="logo"><i class="ri-planet-line" style="color: var(--color-accent); margin-right: 8px;"></i> VRTour</a>
    </nav>

    <div class="auth-container">
        <div class="auth-form glass">
            <h2>Reset Password</h2>
            <p style="color: var(--color-text-light); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5;">
                Enter the email address associated with your account and we'll send you a link to reset your password.
            </p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="name@example.com" required>
                </div>
                
                <p id="resetSuccessMsg" style="color: #2C8C5A; margin-bottom: 1.5rem; display: none; font-size: 0.95rem; padding: 1rem; background: rgba(184, 230, 200, 0.25); border-radius: 12px; border: 1px solid rgba(184, 230, 200, 0.3);"></p>
                
                <button type="submit" id="resetBtn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Send Reset Link</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.95rem;">
                <a href="login.html" style="color: var(--color-text); font-weight: 500;"><i class="ri-arrow-left-line"></i> Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('resetBtn');
            const msg = document.getElementById('resetSuccessMsg');

            btn.innerText = 'Sending...';
            btn.disabled = true;

            // Simulate API call to send reset email
            setTimeout(() => {
                msg.innerHTML = `<strong>Success!</strong><br>If an account exists for <em>${email}</em>, a password reset link has been sent.`;
                msg.style.display = 'block';
                btn.style.display = 'none';
            }, 1500);
        });
    </script>
</body>
</html>
