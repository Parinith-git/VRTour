<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations - VRTour</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <script src="../js/theme.js"></script>

    <nav class="glass">
        <a href="../index.html" class="logo"><i class="ri-planet-line" style="color: var(--color-accent); margin-right: 8px;"></i> VRTour</a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="destinations.html">Destinations</a></li>
            <li><a href="packages.html">Packages</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <h2 class="section-title" style="margin-top: 0;">Explore Destinations</h2>
        <div class="grid-container" id="destinations-container" style="padding:0;">
            <!-- Loaded via JS -->
            <p style="text-align: center; color: var(--color-text-light);">Loading elegant destinations...</p>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('destinations-container');
            try {
                const res = await fetch('http://localhost:8080/api/destinations');
                const destinations = await res.json();
                
                container.innerHTML = '';
                destinations.forEach(dest => {
                    const card = `
                        <div class="card glass">
                            <img src="${dest.imagePath}" alt="${dest.destinationName}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                            <div class="card-content">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <h3>${dest.destinationName}</h3>
                                    <button onclick="addToFavorites(${dest.destinationId}, this)" style="background: none; border: none; cursor: pointer; color: var(--color-text-light); font-size: 1.5rem; transition: color 0.3s;">
                                        <i class="ri-heart-3-line"></i>
                                    </button>
                                </div>
                                <p>${dest.description.substring(0, 100)}...</p>
                                <div style="margin-top: 1.5rem; display: flex; gap: 10px;">
                                    <a href="vr-exploration.html?id=${dest.destinationId}" class="btn btn-primary">VR Preview</a>
                                    <a href="destination-details.html?id=${dest.destinationId}" class="btn btn-outline">Details</a>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                container.innerHTML = '<p style="text-align: center;">Error loading destinations. Is backend running?</p>';
            }
        });

        async function addToFavorites(destId, btnElement) {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login to save favorites.');
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`http://localhost:8080/api/favorites/${destId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    btnElement.innerHTML = '<i class="ri-heart-3-fill" style="color: var(--color-accent);"></i>';
                } else if (res.status === 401) {
                    alert('Session expired. Please log in again.');
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                } else {
                    const text = await res.text();
                    alert(text || 'Could not add to favorites.');
                }
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
