<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VRTour</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <script src="../js/theme.js"></script>

    <nav class="glass">
        <a href="../index.html" class="logo"><i class="ri-planet-line" style="color: var(--color-accent); margin-right: 8px;"></i> VRTour</a>
    </nav>

    <div class="auth-container">
        <div class="auth-form glass">
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <p style="font-size: 0.8rem; color: var(--color-text-light); margin-top: 0.5rem; line-height: 1.4;">
                        Must be at least 8 characters long, contain 1 uppercase letter and 1 special character.
                    </p>
                </div>
                <p id="errorMsg" style="color: #ef4444; margin-bottom: 1.5rem; display: none; font-size: 0.9rem;"></p>
                <p id="successMsg" style="color: #10b981; margin-bottom: 1.5rem; display: none; font-size: 0.9rem;"></p>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Create Account</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.95rem; color: var(--color-text-light);">
                Already have an account? <a href="login.html" style="color: var(--color-text); font-weight: 500;">Login</a>
            </p>

            <div style="margin: 2rem 0; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <hr style="flex: 1; border: none; border-top: 1px solid rgba(0,0,0,0.1);">
                <span style="color: var(--color-text-light); font-size: 0.85rem; text-transform: uppercase;">Or</span>
                <hr style="flex: 1; border: none; border-top: 1px solid rgba(0,0,0,0.1);">
            </div>
            
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID"
                 data-context="signup"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="pill"
                 data-theme="outline"
                 data-text="signup_with"
                 data-size="large"
                 data-logo_alignment="left"
                 style="display: flex; justify-content: center;">
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        async function handleCredentialResponse(response) {
            const token = response.credential;
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const decoded = JSON.parse(jsonPayload);
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('http://localhost:8080/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: decoded.email,
                        name: decoded.name,
                        picture: decoded.picture
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = 'Google Signup failed on server.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = 'Server error. Please try again later.';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
