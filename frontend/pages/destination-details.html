<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Details - VRTour</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <script src="../js/theme.js"></script>

    <nav class="glass">
        <a href="../index.html" class="logo"><i class="ri-planet-line" style="color: var(--color-accent); margin-right: 8px;"></i> VRTour</a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="destinations.html">Destinations</a></li>
            <li><a href="packages.html">Packages</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <div id="details-container">
            <h2 style="text-align: center; color: var(--color-text-light);">Loading details...</h2>
        </div>

        <!-- Reviews Section -->
        <div class="reviews-section">
            <h2 style="margin-bottom: 2rem;">Reviews & Community</h2>
            
            <div id="review-stats">
                <!-- Loaded via JS -->
            </div>

            <div class="card glass" style="padding: 2.5rem; margin-bottom: 3rem; position: relative;">
                <h3 style="margin-bottom: 1.5rem;">Leave a Review</h3>
                <div class="star-rating-input">
                    <i class="ri-star-line" onclick="setRating(1)"></i>
                    <i class="ri-star-line" onclick="setRating(2)"></i>
                    <i class="ri-star-line" onclick="setRating(3)"></i>
                    <i class="ri-star-line" onclick="setRating(4)"></i>
                    <i class="ri-star-line" onclick="setRating(5)"></i>
                </div>
                <div class="form-group">
                    <textarea id="review-comment" placeholder="Share your experience visiting this destination in VR..." style="height: 100px; resize: none;"></textarea>
                </div>
                <button class="btn btn-primary" onclick="submitReview()" style="width: 100%; padding: 1rem;">Post Review</button>
            </div>

            <div id="review-list" class="review-list">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('details-container');
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id') || 1;

            try {
                const res = await fetch(`http://localhost:8080/api/destinations/${id}`);
                const dest = await res.json();
                
                container.innerHTML = `
                    <div class="details-header">
                        <img src="${dest.imagePath}" alt="${dest.destinationName}" class="details-img" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                        <div class="details-info">
                            <h1>${dest.destinationName}</h1>
                            <div style="margin-bottom: 2rem;">
                                <span class="tag"><i class="ri-map-pin-line"></i> ${dest.location}</span>
                                <span class="tag" style="background: var(--color-secondary); color: var(--color-text); border: 1px solid rgba(198, 231, 255, 0.3);"><i class="ri-leaf-line"></i> ${dest.environmentType} Environment</span>
                            </div>
                            <p>${dest.description}</p>
                            
                            <div style="display: flex; gap: 15px; margin-top: 1rem;">
                                <a href="vr-exploration.html?id=${dest.destinationId}" class="btn btn-primary" style="font-size: 1.1rem; padding: 1.2rem 2.5rem;">Explore in VR</a>
                                <a href="packages.html?destId=${dest.destinationId}" class="btn btn-outline" style="font-size: 1.1rem; padding: 1.2rem 2.5rem;">View Packages</a>
                            </div>
                        </div>
                    </div>
                `;

                // Load Reviews and Stats
                loadReviews(id);
                loadStats(id);

            } catch (error) {
                container.innerHTML = '<p style="text-align: center;">Error loading destination details.</p>';
            }
        });

        async function loadStats(destId) {
            try {
                const res = await fetch(`http://localhost:8080/api/reviews/stats/${destId}`);
                const stats = await res.json();
                
                const statsContainer = document.getElementById('review-stats');
                if (!statsContainer) return;

                const avg = stats.averageRating || 0;
                const total = stats.totalReviews || 0;
                const dist = stats.distribution || [0,0,0,0,0,0];

                let distHtml = '';
                for (let i = 5; i >= 1; i--) {
                    const pct = total > 0 ? (dist[i] / total) * 100 : 0;
                    distHtml += `
                        <div class="dist-row">
                            <span>${i} <i class="ri-star-fill" style="font-size:0.8rem; color:var(--color-accent)"></i></span>
                            <div class="dist-bar-bg"><div class="dist-bar-fill" style="width: ${pct}%"></div></div>
                            <span style="width: 30px; text-align: right">${dist[i]}</span>
                        </div>
                    `;
                }

                statsContainer.innerHTML = `
                    <div class="rating-summary">
                        <div class="avg-rating-box">
                            <div class="score">${avg}</div>
                            <div class="stars">${generateStars(avg)}</div>
                            <div style="font-size: 0.8rem; color: var(--color-text-light); margin-top: 5px;">${total} Reviews</div>
                        </div>
                        <div class="rating-distribution">
                            ${distHtml}
                        </div>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }

        async function loadReviews(destId) {
            try {
                const res = await fetch(`http://localhost:8080/api/reviews/destination/${destId}`);
                const reviews = await res.json();
                
                const list = document.getElementById('review-list');
                if (reviews.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: var(--color-text-light); padding: 2rem;">No reviews yet. Be the first to share your experience!</p>';
                    return;
                }

                list.innerHTML = reviews.map(r => `
                    <div class="card glass review-card">
                        <div class="user-avatar">${(r.user.name || 'U').charAt(0).toUpperCase()}</div>
                        <div class="review-content">
                            <div class="review-header">
                                <span class="user-name">${r.user.name || 'Anonymous User'}</span>
                                <span class="time">${formatTimeAgo(r.createdAt)}</span>
                            </div>
                            <div class="review-stars">${generateStars(r.rating)}</div>
                            <p class="review-text">${r.comment}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        let selectedRating = 0;
        function setRating(rating) {
            selectedRating = rating;
            const stars = document.querySelectorAll('.star-rating-input i');
            stars.forEach((s, i) => {
                if (i < rating) {
                    s.classList.add('ri-star-fill', 'active');
                    s.classList.remove('ri-star-line');
                } else {
                    s.classList.remove('ri-star-fill', 'active');
                    s.classList.add('ri-star-line');
                }
            });
        }

        async function submitReview() {
            const urlParams = new URLSearchParams(window.location.search);
            const destId = urlParams.get('id') || 1;
            const comment = document.getElementById('review-comment').value;
            const token = localStorage.getItem('token');

            if (!token) {
                alert('Please login to leave a review.');
                window.location.href = 'login.html';
                return;
            }

            if (selectedRating === 0) {
                alert('Please select a star rating.');
                return;
            }

            if (!comment.trim()) {
                alert('Please write a short comment.');
                return;
            }

            try {
                const res = await fetch('http://localhost:8080/api/reviews', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        destinationId: destId,
                        rating: selectedRating,
                        comment: comment
                    })
                });

                if (res.ok) {
                    document.getElementById('review-comment').value = '';
                    setRating(0);
                    loadReviews(destId);
                    loadStats(destId);
                } else {
                    const err = await res.text();
                    alert(err);
                }
            } catch (e) { console.error(e); }
        }

        function generateStars(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating)) html += '<i class="ri-star-fill"></i>';
                else if (i - 0.5 <= rating) html += '<i class="ri-star-half-fill"></i>';
                else html += '<i class="ri-star-line"></i>';
            }
            return html;
        }

        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            
            if (diffInSeconds < 60) return 'Just now';
            if (diffInSeconds < 3600) return Math.floor(diffInSeconds / 60) + 'm ago';
            if (diffInSeconds < 86400) return Math.floor(diffInSeconds / 3600) + 'h ago';
            return Math.floor(diffInSeconds / 86400) + 'd ago';
        }
    </script>
</body>
</html>
